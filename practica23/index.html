<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 23 - Índice de Masa Corporal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        .resultado {
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
            font-size: 1.1rem;
        }
        .tabla {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.5rem;
            border: 1px solid #ddd;
            text-align: left;
        }
        th { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <h1>Práctica 23 - Índice de Masa Corporal (IMC)</h1>

    <form id="imcForm">
        <div class="form-group">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" step="0.1" min="1" required>
        </div>

        <div class="form-group">
            <label for="altura">Altura (m):</label>
            <input type="number" id="altura" step="0.01" min="0.1" required>
        </div>

        <button type="button" onclick="calcularIMC()">Calcular IMC</button>
    </form>

    <div id="resultado"></div>

    <div class="tabla">
        <h3>Clasificación del IMC (para mujer)</h3>
        <table>
            <tr>
                <th>IMC</th>
                <th>Clasificación</th>
            </tr>
            <tr>
                <td>Menos de 18.5</td>
                <td>Bajo peso</td>
            </tr>
            <tr>
                <td>18.5 - 24.9</td>
                <td>Normal</td>
            </tr>
            <tr>
                <td>25 - 29.9</td>
                <td>Sobrepeso</td>
            </tr>
            <tr>
                <td>30 o más</td>
                <td>Obesidad</td>
            </tr>
        </table>
    </div>

    <script>
        function calcularIMC() {
            var peso = parseFloat(document.getElementById('peso').value);
            var altura = parseFloat(document.getElementById('altura').value);
            var resultado = document.getElementById('resultado');

            if (isNaN(peso) || isNaN(altura) || peso <= 0 || altura <= 0) {
                resultado.innerHTML = '<div class="resultado" style="background:#f8d7da;color:#721c24;">Por favor, ingresa valores válidos.</div>';
                return;
            }

            // Fórmula IMC: peso / altura²
            var imc = peso / (altura * altura);
            imc = Math.round(imc * 10) / 10; // Redondear a 1 decimal

            // Determinar clasificación
            var clasificacion;
            var color;

            if (imc < 18.5) {
                clasificacion = "Bajo peso";
                color = "#fff3cd";
            } else if (imc >= 18.5 && imc <= 24.9) {
                clasificacion = "Normal";
                color = "#d4edda";
            } else if (imc >= 25 && imc <= 29.9) {
                clasificacion = "Sobrepeso";
                color = "#ffeeba";
            } else {
                clasificacion = "Obesidad";
                color = "#f8d7da";
            }

            resultado.innerHTML = '<div class="resultado" style="background:' + color + ';">' +
                '<strong>IMC: ' + imc + '</strong><br>' +
                'Clasificación: ' + clasificacion +
                '</div>';
        }
    </script>

    <p><a href="../index.php">← Volver al menú</a></p>
</body>
</html>
