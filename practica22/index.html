<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 22 - Fórmula general</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        .formula {
            background: #fff3cd;
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
            margin: 1rem 0;
            font-size: 1.2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #45a049; }
        .resultado {
            background: #e8f5e9;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
            font-size: 1.1rem;
        }
        .error {
            background: #f8d7da;
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <h1>Práctica 22 - Fórmula General (Ecuación Cuadrática)</h1>

    <div class="formula">
        x = (-b ± √(b² - 4ac)) / 2a
    </div>

    <form id="formulaGeneral">
        <div class="form-group">
            <label for="a">Valor de a:</label>
            <input type="number" id="a" step="any" required>
        </div>

        <div class="form-group">
            <label for="b">Valor de b:</label>
            <input type="number" id="b" step="any" required>
        </div>

        <div class="form-group">
            <label for="c">Valor de c:</label>
            <input type="number" id="c" step="any" required>
        </div>

        <button type="button" onclick="calcularFormula()">Calcular</button>
    </form>

    <div id="resultado"></div>

    <script>
        function calcularFormula() {
            var a = parseFloat(document.getElementById('a').value);
            var b = parseFloat(document.getElementById('b').value);
            var c = parseFloat(document.getElementById('c').value);
            var resultado = document.getElementById('resultado');

            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                resultado.innerHTML = '<div class="error">Por favor, ingresa todos los valores.</div>';
                return;
            }

            if (a === 0) {
                resultado.innerHTML = '<div class="error">El valor de "a" no puede ser cero (no sería una ecuación cuadrática).</div>';
                return;
            }

            // Calcular discriminante: b² - 4ac
            var discriminante = (b * b) - (4 * a * c);

            if (discriminante < 0) {
                resultado.innerHTML = '<div class="error">El discriminante es negativo (' + discriminante + '). No hay soluciones reales.</div>';
            } else if (discriminante === 0) {
                // Una solución única
                var x = -b / (2 * a);
                resultado.innerHTML = '<div class="resultado">Una solución real:<br><strong>x = ' + x.toFixed(4) + '</strong></div>';
            } else {
                // Dos soluciones
                var x1 = (-b + Math.sqrt(discriminante)) / (2 * a);
                var x2 = (-b - Math.sqrt(discriminante)) / (2 * a);
                resultado.innerHTML = '<div class="resultado">Dos soluciones reales:<br><strong>x1 = ' + x1.toFixed(4) + '</strong><br><strong>x2 = ' + x2.toFixed(4) + '</strong></div>';
            }
        }
    </script>

    <p><a href="../index.php">← Volver al menú</a></p>
</body>
</html>
